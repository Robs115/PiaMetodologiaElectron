<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styleindex.css">
    <link rel="stylesheet" href="/ventas.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>Editar Venta</title>
</head>
<body>
    <div class="cprincipal">
        <nav class="sidebar">
            <h2>Panel principal</h2>
            <img src="/logoempresa.png" alt="Logo de empresa">
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/venta">Ventas</a></li>
                <li><a href="/clientes">Clientes</a></li>
                <li><a href="/productos">Productos</a></li>
                <li><a href="/pedidos">Pedidos</a></li>
                <li><a href="/proveedores">Proveedores</a></li>
            </ul>
        </nav>

        <main class="contenido">
            <div class="form-container">
                <h2>Editar Venta</h2>
                <div id="loading" class="loading">Cargando datos...</div>

                <form id="formEditarVenta" style="display: none;">
                    <div class="form-group">
                        <label>Fecha de Venta *</label>
                        <input type="date" id="fecha" required>
                    </div>

                    <div class="form-group">
                        <label>ID Usuario *</label>
                        <input type="number" id="idusuario" required>
                        <small>ID del usuario que realizó la venta</small>
                    </div>

                    <div class="form-group">
                        <label>Total</label>
                        <input type="text" id="total" readonly disabled>
                        <small>El total se calcula automáticamente</small>
                    </div>

                    <div class="form-group">
                        <label>Productos de la Venta</label>
                        <div id="detalles-container" class="detalles-container"></div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancelar" onclick="window.location.href='/venta/listar'">
                            Cancelar
                        </button>
                        <button type="submit" class="btn-guardar">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/js/ventas-editar.js"></script>
</body>
</html>
