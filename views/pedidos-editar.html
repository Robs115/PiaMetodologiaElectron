<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styleindex.css">
    <link rel="stylesheet" href="/pedidos.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>Editar Pedido</title>
</head>
<body>
    <div class="cprincipal">
        <nav class="sidebar">
            <h2>Panel principal</h2>
            <img src="/logoempresa.png" alt="Logo de empresa">
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/venta">Ventas</a></li>
                <li><a href="/clientes">Clientes</a></li>
                <li><a href="/productos">Productos</a></li>
                <li><a href="/pedidos">Pedidos</a></li>
                <li><a href="/proveedores">Proveedores</a></li>
            </ul>
        </nav>

        <main class="contenido">
            <div class="form-container">
                <h2>Editar Pedido</h2>
                <div id="loading" class="loading">Cargando datos...</div>

                <form id="formEditarPedido" style="display: none;">
                    <div class="form-group">
                        <label>Producto Actual</label>
                        <div id="info-producto" class="info-box"></div>
                        <small>Para cambiar el producto, modifica el ID a continuación</small>
                    </div>

                    <div class="form-group">
                        <label>ID Producto *</label>
                        <input type="number" id="idproducto" required>
                    </div>

                    <div class="form-group">
                        <label>Proveedor Actual</label>
                        <div id="info-proveedor" class="info-box"></div>
                        <small>Para cambiar el proveedor, modifica el ID a continuación</small>
                    </div>

                    <div class="form-group">
                        <label>ID Proveedor *</label>
                        <input type="number" id="idproveedor" required>
                    </div>

                    <div class="form-group">
                        <label>Fecha del Pedido *</label>
                        <input type="date" id="fechapedido" required>
                    </div>

                    <div class="form-group">
                        <label>Cantidad *</label>
                        <input type="number" id="cantidad" min="1" required>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancelar" onclick="window.location.href='/pedidos'">
                            Cancelar
                        </button>
                        <button type="submit" class="btn-guardar">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/js/pedidos-editar.js"></script>
</body>
</html>
