<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Bootstrap-->
   <link rel="stylesheet" href="/styleindex.css" >
   <link rel="stylesheet" href="/ventas.css" >
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <title>VidaVet - Veterinaria profesional</title>
</head>
<body>
    <div class="cprincipal">
        <nav class="sidebar">

            <h2>Panel principal</h2>
            <img src="/logoempresa.png" alt="Logo de empresa">
            <ul>
                <li><a href="/">Inicio</a></li>
            <li><a href="/venta">Ventas</a></li>
            <li><a href="/clientes">Clientes</a></li>
            <li><a href="/productos">Productos</a></li>
            <li><a href="/pedidos">Pedidos</a></li>
            <li><a href="/proveedores">Proveedores</a></li>
            </ul>
            

        </nav>


        
        <main class="contenido">
            <div class="ventas-container">

                <div class="header-ventas">
                    <h2>Gestión de Detalle venta</h2>
                    <input type="text" id="buscador" placeholder="Buscar venta...">
                </div>

                <div class="tabla-contenedor">
                    <table id="tablaDetalleVentas">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Fecha</th>
                                <th>ID Venta</th>
                                <th>ID usuario</th>
                                <th>ID producto</th>
                                <th>Producto</th> 
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Subtotal</th>
                                
                            </tr>
                        </thead>
                        <tbody>
                            
                        </tbody>
                    </table>
                </div>
                <div id="total"></div>
            </div>

   
            <link rel="stylesheet" href="/ventas.css">
           <button class="btn crear"><a href="/ventas-listar">Regresar</a></button>
            <script src="/js/detalle-venta.js"></script>
        </main>
    </div>
</body>
</html>
