<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Bootstrap-->
   <link rel="stylesheet" href="/styleindex.css" >
   <link rel="stylesheet" href="/proveedores.css" >
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <title>Crear proveedores</title>
</head>
<body>
    <div class="cprincipal">
        <nav class="sidebar">

            <h2>Panel principal</h2>
            <img src="/logoempresa.png" alt="Logo de empresa">
            <ul>
                <li><a href="/dashboard">Inicio</a></li>
            <li><a href="/venta">Ventas</a></li>
            <li><a href="/clientes">Clientes</a></li>
            <li><a href="/productos">Productos</a></li>
            <li><a href="/pedidos">Pedidos</a></li>
            <li><a href="/proveedores">Proveedores</a></li>
            </ul>
            

        </nav>


        
        <main class="contenido">

            <div class="form-container">
                <h2>Crear Nuevo Proveedor</h2>

                <form id="formProveedor">

                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="nombre" required>
                    </div>

                    <div class="form-group">
                        <label>Telefono</label>
                        <input type="text" id="telefono" required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label>Direccion</label>
                        <input type="text" id="direccion" required>
                    </div>

                    <select name="activo" id="activo">
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>

                    <div class="form-actions">
                        <button type="submit" class="btn crear">Guardar Proveedor</button>
                        <button type="button" class="btn eliminar"
                            onclick="window.location.href='/proveedores'">
                            Cancelar
                        </button>

                    </div>

                </form>
            </div>

        </main>

        <script src="/js/proveedores-crear.js"></script>
    </div>
    <div id="toast" class="toast hidden">
        Proveedor creado correctamente
    </div>
</body>
</html>
