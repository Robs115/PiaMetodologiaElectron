<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styleindex.css">
    <link rel="stylesheet" href="/ventas.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>VidaVet - Listado de Ventas</title>
</head>
<body>
    <div class="cprincipal">
        <nav class="sidebar">
            <h2>Panel principal</h2>
            <img src="/logoempresa.png" alt="Logo de empresa">
            <ul>
                <li><a href="/dashboard">Inicio</a></li>
                <li><a href="/venta">Ventas</a></li>
                <li><a href="/clientes">Clientes</a></li>
                <li><a href="/productos">Productos</a></li>
                <li><a href="/pedidos">Pedidos</a></li>
                <li><a href="/proveedores">Proveedores</a></li>
            </ul>
        </nav>

        <main class="contenido">
            <div class="ventas-container">
                <div class="header-ventas">
                    <h2>Gestión de Ventas</h2>
                    <div class="acciones-header">
                        <input type="text" id="buscador" placeholder="Buscar venta por ID o usuario...">
                        <a href="/venta" class="btn btn-crear">+ Nueva Venta</a>
                    </div>
                </div>

                <div class="tabla-contenedor">
                    <table id="tablaVentas">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Fecha</th>
                                <th>Usuario</th>
                                <th>Total</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/ventas-listar.js"></script>
</body>
</html>
